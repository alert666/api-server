<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden;">
  <tr>
    <td style="background: #dc2626; padding: 16px 24px;">
      <span style="color: #fff; font-size: 18px; font-weight: 600;">🚨 告警通知</span>
    </td>
  </tr>
  <tr>
    <td style="padding: 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; color: #666; width: 100px;">告警名称</td>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; font-weight: 600;">{{ index .Labels "alertname" }}</td>
        </tr>
        <tr>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; color: #666;">级别</td>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee;">{{ index .Labels "severity" }}</td>
        </tr>
        <tr>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; color: #666;">集群</td>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee;">{{ getClusterLabel (index .Labels "cluster") }}</td>
        </tr>
        <tr>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; color: #666;">开始时间</td>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee;">{{ timeFormat .StartsAt }}</td>
        </tr>
        <tr>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee; color: #666;">状态</td>
          <td style="padding: 8px 12px; border-bottom: 1px solid #eee;">{{ getEndTime .EndsAt "告警未恢复" }}</td>
        </tr>
      </table>

      <div style="margin-top: 20px; padding: 16px; background: #fefce8; border-left: 4px solid #eab308; border-radius: 4px;">
        <strong style="color: #854d0e;">描述</strong>
        <p style="margin: 8px 0 0; color: #713f12; white-space: pre-wrap;">{{ getDescript . }}</p>
      </div>

      <div style="margin-top: 16px; text-align: center;">
        <a href="{{ getGrafanaExploreLink "https://kp-grafana.prod.karmada.suanleme.local" .GeneratorURL "thanos" }}" style="display: inline-block; padding: 10px 24px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; margin: 0 8px;">在 Grafana 中查看</a>
        <a href="https://cloud.suanlene.cn/workspace/alert/history?page=1&pageSize=15&status=firing&tenant={{ index .Labels "cluster" }}" style="display: inline-block; padding: 10px 24px; background: #6b7280; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; margin: 0 8px;">平台查看</a>
      </div>
    </td>
  </tr>
  <tr>
    <td style="background: #f9fafb; padding: 12px 24px; text-align: center; color: #9ca3af; font-size: 12px;">
      由 AlertManager 自动发送
    </td>
  </tr>
</table>
</body>
</html>
