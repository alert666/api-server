definitions:
  model.Matcher:
    properties:
      name:
        description: 标签名
        type: string
      type:
        description: '操作符: =, !=, =~, !~'
        type: string
      value:
        description: 标签值
        type: string
    type: object
  types.Alert:
    properties:
      annotations:
        additionalProperties:
          type: string
        type: object
      endsAt:
        type: string
      fingerprint:
        type: string
      generatorURL:
        type: string
      isSilenced:
        type: boolean
      labels:
        additionalProperties:
          type: string
        type: object
      silenceID:
        type: integer
      startsAt:
        type: string
      status:
        description: '"firing" or "resolved"'
        type: string
    type: object
  types.AlertChannelCreateRequest:
    properties:
      aggregationStatus:
        enum:
        - 0
        - 1
        type: integer
      config:
        additionalProperties: {}
        type: object
      description:
        type: string
      name:
        maxLength: 15
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      type:
        enum:
        - feishuApp
        - feishuBoot
        - webhook
        - email
        type: string
    required:
    - config
    - name
    - status
    - type
    type: object
  types.AlertChannelUpdateRequest:
    properties:
      aggregationStatus:
        enum:
        - 0
        - 1
        type: integer
      config:
        additionalProperties: {}
        type: object
      description:
        type: string
      id:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
      type:
        enum:
        - feishuApp
        - feishuBoot
        - webhook
        - email
        type: string
    required:
    - aggregationStatus
    - config
    - id
    - status
    - type
    type: object
  types.AlertHistoryUpdateRequest:
    properties:
      id:
        type: integer
      status:
        type: string
    required:
    - id
    - status
    type: object
  types.AlertReceiveReq:
    properties:
      alerts:
        items:
          $ref: '#/definitions/types.Alert'
        type: array
      commonAnnotations:
        additionalProperties:
          type: string
        type: object
      commonLabels:
        additionalProperties:
          type: string
        type: object
      externalURL:
        type: string
      groupKey:
        type: string
      groupLabels:
        additionalProperties:
          type: string
        type: object
      receiver:
        type: string
      status:
        description: '"firing" or "resolved"'
        type: string
      templateName:
        type: string
      truncatedAlerts:
        type: integer
      version:
        type: string
    required:
    - templateName
    type: object
  types.AlertSilenceCreateRequest:
    properties:
      comment:
        maxLength: 255
        type: string
      endsAt:
        type: integer
      fingerprint:
        type: string
      matchers:
        items:
          $ref: '#/definitions/model.Matcher'
        type: array
      startsAt:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
      type:
        enum:
        - 1
        - 2
        type: integer
    required:
    - comment
    - endsAt
    - startsAt
    - status
    - type
    type: object
  types.AlertTemplateCopyRequest:
    properties:
      id:
        type: integer
      name:
        type: string
    required:
    - id
    - name
    type: object
  types.AlertTemplateCreateRequest:
    properties:
      aggregationTemplate:
        type: string
      alertChannelID:
        type: integer
      description:
        type: string
      name:
        type: string
      receiveId:
        items:
          type: string
        type: array
      receiveIdType:
        enum:
        - open_id
        - user_id
        - email
        - chat_id
        type: string
      template:
        type: string
    required:
    - name
    - receiveId
    - receiveIdType
    - template
    type: object
  types.AlertTemplateUpdateRequest:
    properties:
      aggregationTemplate:
        type: string
      alertChannelID:
        type: integer
      description:
        type: string
      id:
        type: integer
      receiveId:
        items:
          type: string
        type: array
      receiveIdType:
        enum:
        - open_id
        - user_id
        - email
        - chat_id
        type: string
      template:
        type: string
    required:
    - id
    - receiveId
    - receiveIdType
    - template
    type: object
  types.ApiCreateRequest:
    properties:
      description:
        type: string
      effect:
        enum:
        - allow
        - deny
        type: string
      method:
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - '*'
        type: string
      name:
        type: string
      path:
        type: string
    required:
    - effect
    - method
    - name
    - path
    type: object
  types.ApiUpdateRequest:
    properties:
      description:
        type: string
      id:
        type: integer
    required:
    - id
    type: object
  types.IDRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  types.OAuthActivateRequest:
    properties:
      confirmPassword:
        type: string
      id:
        type: integer
      password:
        type: string
    type: object
  types.Response:
    properties:
      code:
        type: integer
      data: {}
      error:
        type: string
      msg:
        type: string
    type: object
  types.RoleCreateRequest:
    properties:
      apis:
        items:
          type: integer
        type: array
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  types.RoleUpdateRequest:
    properties:
      apis:
        items:
          type: integer
        type: array
      description:
        type: string
      id:
        type: integer
    required:
    - id
    type: object
  types.SendCommandAndWaitReq:
    properties:
      description:
        type: string
      params:
        additionalProperties:
          type: string
        type: object
      type:
        type: integer
    required:
    - description
    - type
    type: object
  types.TenantCreateRequest:
    properties:
      description:
        type: string
      label:
        type: string
      name:
        type: string
    required:
    - label
    - name
    type: object
  types.TenantUpdateRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      label:
        type: string
    required:
    - id
    - label
    type: object
  types.UserCreateRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      mobile:
        type: string
      name:
        type: string
      nickName:
        type: string
      password:
        minLength: 8
        type: string
      rolesID:
        items:
          type: integer
        type: array
    required:
    - email
    - name
    - password
    type: object
  types.UserLoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  types.UserUpdateAdminRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      id:
        type: integer
      mobile:
        type: string
      name:
        type: string
      nickName:
        type: string
      oldPassword:
        minLength: 8
        type: string
      password:
        minLength: 8
        type: string
      rolesID:
        items:
          type: integer
        type: array
      status:
        enum:
        - 1
        - 2
        type: integer
    required:
    - id
    type: object
  types.UserUpdateSelfRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      mobile:
        type: string
      name:
        type: string
      nickName:
        type: string
      oldPassword:
        minLength: 8
        type: string
      password:
        minLength: 8
        type: string
    type: object
host: 0.0.0.0:8080
info:
  contact: {}
  description: 告警管理后端服务 API 文档，支持告警接收、静默、抑制、通知、多租户管理、RBAC 权限控制等功能。
  title: api-server — 告警管理 API
  version: "1.0"
paths:
  /api/v1/agents/commands/wait:
    post:
      consumes:
      - application/json
      description: 通过 gRPC 数据隧道向指定 Agent 发送命令，阻塞等待执行结果后返回。
      parameters:
      - description: 命令请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.SendCommandAndWaitReq'
      produces:
      - application/json
      responses:
        "200":
          description: 命令执行成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 向 Agent 下发命令
      tags:
      - Agent 命令
  /api/v1/alertChannel:
    get:
      consumes:
      - application/json
      description: 获取所有 AlerChannel
      parameters:
      - enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
      - in: query
        name: name
        type: string
      - description: Page 从 1 开始, 表示第几页
        in: query
        minimum: 1
        name: page
        type: integer
      - description: PageSize 最大值 100，默认值 20, 表示每页多少条数据
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        type: integer
      - enum:
        - id
        - name
        - created_at
        - updated_at
        in: query
        name: sort
        type: string
      - enum:
        - feishuApp
        - feishuBoot
        - webhook
        - email
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取所有 AlerChannel
      tags:
      - AlerChannel 管理
    post:
      consumes:
      - application/json
      description: 创建 AlerChannel
      parameters:
      - description: 创建请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertChannelCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 创建 AlerChannel
      tags:
      - AlerChannel 管理
  /api/v1/alertChannel/:id:
    delete:
      consumes:
      - application/json
      description: 删除 AlerChannel
      parameters:
      - description: 删除请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.IDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 删除 AlerChannel
      tags:
      - AlerChannel 管理
    get:
      consumes:
      - application/json
      description: 查询 AlerChannel
      parameters:
      - description: 查询请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.IDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 查询 AlerChannel
      tags:
      - AlerChannel 管理
    put:
      consumes:
      - application/json
      description: 更新 AlerChannel
      parameters:
      - description: 更新请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertChannelUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 更新 AlerChannel
      tags:
      - AlerChannel 管理
  /api/v1/alertHistory:
    get:
      consumes:
      - application/json
      description: 获取所有 AlertHistory
      parameters:
      - in: query
        name: alertName
        type: string
      - in: query
        name: alertSendRecordId
        type: integer
      - enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
      - in: query
        name: endsAt
        type: integer
      - in: query
        name: fingerprint
        type: string
      - in: query
        name: instance
        type: string
      - collectionFormat: csv
        in: query
        items:
          type: string
        name: labels
        type: array
      - description: Page 从 1 开始, 表示第几页
        in: query
        minimum: 1
        name: page
        type: integer
      - description: PageSize 最大值 100，默认值 20, 表示每页多少条数据
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        type: integer
      - in: query
        name: severity
        type: string
      - enum:
        - id
        - alertname
        - fingerprint
        - starts_at
        - ends_at
        - severity
        - instance
        in: query
        name: sort
        type: string
      - in: query
        name: startsAt
        type: integer
      - enum:
        - resolved
        - firing
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取所有 AlertHistory
      tags:
      - AlertHistory 管理
  /api/v1/alertHistory/:id:
    get:
      consumes:
      - application/json
      description: 使用 ID 查询告警历史详情
      parameters:
      - description: 告警历史ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 查询 AlertHistory
      tags:
      - AlertHistory 管理
    put:
      consumes:
      - application/json
      description: 更新 AlertHistory 状态
      parameters:
      - description: 告警历史ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertHistoryUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 更新 AlertHistory 状态
      tags:
      - AlertHistory 管理
  /api/v1/alertHistory/alertNameOptions:
    get:
      consumes:
      - application/json
      description: 获取 AlertHistory aletName options
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取 AlertHistory aletName options
      tags:
      - AlertHistory 管理
  /api/v1/alertHistory/firingCount:
    get:
      consumes:
      - application/json
      description: 更新 获取 AlertHistory 告警状态数量
      produces:
      - application/json
      responses:
        "200":
          description: 询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取 AlertHistory 告警状态数量
      tags:
      - AlertHistory 管理
  /api/v1/alertSilence:
    get:
      consumes:
      - application/json
      description: 获取所有 AlerSilence
      parameters:
      - in: query
        name: createdBy
        type: string
      - enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
      - in: query
        name: endsAt
        type: integer
      - description: Page 从 1 开始, 表示第几页
        in: query
        minimum: 1
        name: page
        type: integer
      - description: PageSize 最大值 100，默认值 20, 表示每页多少条数据
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        type: integer
      - enum:
        - id
        - name
        - created_at
        - updated_at
        in: query
        name: sort
        type: string
      - in: query
        name: startsAt
        type: integer
      - enum:
        - 0
        - 1
        in: query
        name: status
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取所有 AlerSilence
      tags:
      - AlerSilence 管理
    post:
      consumes:
      - application/json
      description: 创建 AlerSilence
      parameters:
      - description: 创建请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertSilenceCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 创建 AlerSilence
      tags:
      - AlerSilence 管理
  /api/v1/alertSilence/:id:
    delete:
      consumes:
      - application/json
      description: 删除 AlerSilence
      parameters:
      - description: 静默规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 删除 AlerSilence
      tags:
      - AlerSilence 管理
    get:
      consumes:
      - application/json
      description: 查询 AlerSilence
      parameters:
      - description: 静默规则ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 查询 AlerSilence
      tags:
      - AlerSilence 管理
  /api/v1/alertSilence/enableCount:
    get:
      consumes:
      - application/json
      description: 获取各个租户活跃 AlerSilence 的数量
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取各个租户活跃 AlerSilence 的数量
      tags:
      - AlerSilence 管理
  /api/v1/alertTemplate:
    get:
      consumes:
      - application/json
      description: 获取所有 AlerTemplate
      parameters:
      - enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
      - in: query
        name: name
        type: string
      - description: Page 从 1 开始, 表示第几页
        in: query
        minimum: 1
        name: page
        type: integer
      - description: PageSize 最大值 100，默认值 20, 表示每页多少条数据
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        type: integer
      - enum:
        - id
        - name
        - created_at
        - updated_at
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 获取所有 AlerTemplate
      tags:
      - AlerTemplate 管理
    post:
      consumes:
      - application/json
      description: 创建 AlerTemplate
      parameters:
      - description: 创建请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertTemplateCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 创建 AlerTemplate
      tags:
      - AlerTemplate 管理
  /api/v1/alertTemplate/:id:
    delete:
      consumes:
      - application/json
      description: 删除 AlerTemplate
      parameters:
      - description: 删除请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.IDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 删除 AlerTemplate
      tags:
      - AlerTemplate 管理
    get:
      consumes:
      - application/json
      description: 查询 AlerTemplate
      parameters:
      - description: 查询请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.IDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 查询 AlerTemplate
      tags:
      - AlerTemplate 管理
    put:
      consumes:
      - application/json
      description: 更新 AlerTemplate
      parameters:
      - description: 更新请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertTemplateUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/types.Response'
      summary: 更新 AlerTemplate
      tags:
      - AlerTemplate 管理
  /api/v1/alertTemplate/:id/copy:
    post:
      consumes:
      - application/json
      description: 拷贝一个已有的 AlerTemplate，需指定新名称
      parameters:
      - description: 被拷贝模板的 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 拷贝请求参数（name 为新模板名称）
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertTemplateCopyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 拷贝成功，返回新创建的模板
          schema:
            $ref: '#/definitions/types.Response'
      summary: 拷贝 AlerTemplate
      tags:
      - AlerTemplate 管理
  /api/v1/alerts:
    post:
      consumes:
      - application/json
      description: 作为 Alertmanager Webhook 回调接口，接收并持久化告警数据。支持同时绑定 query 参数（templateName）和
        JSON body。
      parameters:
      - description: 告警模板名称
        in: query
        name: templateName
        required: true
        type: string
      - description: Alertmanager Webhook JSON 数据
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/types.AlertReceiveReq'
      produces:
      - application/json
      responses:
        "200":
          description: 接收成功
          schema:
            $ref: '#/definitions/types.Response'
      security:
      - BearerAuth: []
      summary: 接收 Alertmanager 告警
      tags:
      - 告警管理
  /api/v1/api:
    get:
